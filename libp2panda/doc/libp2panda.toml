[library]
version = "0.1.0"
description = "GObject wrapper for p2panda"
authors = "Julian Sparber"
license = "MPL-2.0 OR LGPL-2.1-or-later"
browse_url = "https://github.com/p2panda/p2panda-gobject"
repository_url = "https://github.com/p2panda/p2panda-gobject"
website_url = "https://github.com/p2panda/p2panda-gobject"
docs_url = "https://github.com/p2panda/p2panda-gobject"
devhelp = true
search_index = true

[theme]
show_index_summary = true

[dependencies."Glib-2.0"]
name = "GLib"
description = "The base utility library"
docs_url = "https://docs.gtk.org/glib/"

[dependencies."GObject-2.0"]
name = "GObject"
description = "The base type system library"
docs_url = "https://docs.gtk.org/gobject/"

[dependencies."Gio-2.0"]
name = "Gio"
description = "GObject Interfaces and Objects, Networking, IPC, and I/O"
docs_url = "https://docs.gtk.org/gio/"

[source-location]
base_url = "https://gitlab.gnome.org/GNOME/glycin/-/blob/main/libglycin/include/"

[extra]
urlmap_file = "urlmap.js"
